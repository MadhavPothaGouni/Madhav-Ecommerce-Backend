input {
  tcp {
    port => 5000
    codec => json_lines
  }
  udp {
    port => 5001
    codec => json_lines
  }
}

filter {
  # Parse timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:local}" }
  }

  # Extract traceId / spanId from MDC if present
  if [traceId] {
    mutate {
      add_field => { "trace_id" => "%{traceId}" }
    }
  }

  if [spanId] {
    mutate {
      add_field => { "span_id" => "%{spanId}" }
    }
  }

  # Map log level to severity
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  } else if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # Drop noisy actuator health-check logs
  if [logger_name] =~ /HealthEndpoint/ {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ecommerce-logs-%{[app]}-%{+YYYY.MM.dd}"
    template_name => "ecommerce-logs"
    manage_template => true
  }

  # Debug: also output to stdout during development
  stdout {
    codec => rubydebug
  }
}
